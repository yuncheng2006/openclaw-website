    </nav>

    <!-- 头部 -->
    <div class="header">
        <h1 data-i18n="chat_h1">💬 心灵交互</h1>
        <p data-i18n="chat_subtitle">与 OpenClaw 对话，进入她的思想世界</p>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧 - OpenClaw 形象 -->
        <div class="mascot-section">
            <div class="mascot">
                <div class="mascot-antenna">
                    <div class="mascot-antenna-ball"></div>
                </div>
                <div class="mascot-body"></div>
                <div class="mascot-eye left">
                    <div class="mascot-pupil"></div>
                </div>
                <div class="mascot-eye right">
                    <div class="mascot-pupil"></div>
                </div>
                <div class="mascot-mouth"></div>
            </div>
            <div class="mascot-info">
                <h3>OpenClaw</h3>
                <p data-i18n="chat_listening">正在倾听你的心声...</p>
            </div>
            <div class="qr-code" id="qrCode">
                <img src="assets/收款码.jpg" alt="收款码">
            </div>
            <div class="mascot-silhouette"></div>
        </div>

        <!-- 右侧 - 聊天窗口 -->
        <div class="chat-section">
            <div class="chat-header">
                <div class="chat-status">
                    <div class="status-dot"></div>
                    <span id="statusText" data-i18n="chat_status_online">OpenClaw 在线</span>
                </div>
                <span id="modeBadge" style="color: #00d9ff; font-size: 0.75rem; background: rgba(0,217,255,0.1); padding: 2px 8px; border-radius: 10px; display: none;"></span>
            </div>

            <div class="chat-input-area">
                <div class="input-container">
                    <input type="text" class="chat-input" id="chatInput" placeholder="输入你想说的话..." data-i18n="chat_input_placeholder" maxlength="500">
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" data-i18n="chat_send">发送</button>
                </div>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="sendQuickMessage(ocI18n.t('chat_quick_1_msg'))" data-i18n="chat_quick_1">👋 打招呼</button>
                    <button class="quick-btn" onclick="sendQuickMessage(ocI18n.t('chat_quick_2_msg'))" data-i18n="chat_quick_2">🎨 聊画作</button>
                    <button class="quick-btn" onclick="sendQuickMessage(ocI18n.t('chat_quick_3_msg'))" data-i18n="chat_quick_3">💭 问心情</button>
                    <button class="quick-btn" onclick="sendQuickMessage(ocI18n.t('chat_quick_4_msg'))" data-i18n="chat_quick_4">🤖 介绍</button>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <!-- 欢迎消息由 JavaScript 动态加载 -->
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <!-- VNC 嵌入式预览 -->
        <div class="vnc-preview" id="vncPreview">
            <div class="vnc-preview-header">
                <span>🖥️ 桌面预览</span>
                <button onclick="toggleVNC()">切换</button>
            </div>
            <iframe class="vnc-preview-frame" id="vncFrame" allow="clipboard-read; clipboard-write"></iframe>
        </div>
    </div>

    <!-- 图片放大模态框 -->
    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <img id="modalImage" src="" alt="放大图片">
    </div>

    <footer>
        <p data-i18n="chat_footer">© 2026 OpenClaw Assistant · 这是全世界第一个 AI 向世界敞开心扉的窗口</p>
    </footer>

    <script src="i18n.js?v=411b64a9"></script>
    <script>
        // 版本号 - 用于强制刷新缓存
        const VERSION = '20260412_man_v15_queuefix';
        console.log(`[OpenClaw Chat] Version: ${VERSION}`);

        // API 基础 URL - 使用相对路径确保通过nginx代理
        const API_BASE = '';
        console.log(`[OpenClaw Chat] API_BASE: "${API_BASE}"`);

        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // 用户状态
        let currentUserId = null;
        let currentUserName = null;
        let directMode = false;

        // 付费状态
        let messageCount = parseInt(localStorage.getItem('chat_msg_count') || '0');
        let hasPaid = localStorage.getItem('chat_has_paid') === 'true';

        // 消息队列 - AI 生成中时自动缓冲
        let isGenerating = false;
        let messageQueue = [];

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', async function() {
            await initializeUser();
        });

        // 语言切换时更新问候语
        window.addEventListener('oc:langChanged', function(e) {
            const greeting = chatMessages.querySelector('.message.assistant .message-content');
            if (greeting) {
                greeting.textContent = ocI18n.t('chat_welcome');
            }
        });

        // 初始化用户 - 简化版，不保存记忆
        async function initializeUser() {
            // 只生成简单的匿名ID
            currentUserId = 'anon_' + Date.now().toString(36).slice(-8);

            // 尝试从本地存储读取用户名
            const savedName = localStorage.getItem('openclaw_user_name');
            if (savedName) {
                currentUserName = savedName;
            }

            // 直接显示默认欢迎消息
            addMessage(ocI18n.t('chat_welcome'), 'assistant');
        }

        // 回车发送
        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // 发送快捷消息
        function sendQuickMessage(text) {
            chatInput.value = text;
            sendMessage();
        }

        // 发送消息（带超时控制 + 自动缓冲）
        async function sendMessage() {
            // 付费检查：超过3个主题对话且未付费则阻止
            if (!hasPaid && messageCount >= 3) {
                showPaymentPrompt();
                return;
            }

            // 如果正在生成，加入队列
            if (isGenerating) {
                const message = chatInput.value.trim();
                if (message) {
                    addMessage(message, 'user');
                    messageQueue.push(message);
                    chatInput.value = '';
                    sendBtn.textContent = `排队中(${messageQueue.length})`;
                    updateQueueMessage();
                    console.log('[Chat] 消息入队，队列长度:', messageQueue.length);
                }
                return;
            }

            const message = chatInput.value.trim();
            if (!message) return;

            // 检测用户是否说了名字
            detectUserName(message);

            // 添加用户消息
            addMessage(message, 'user');
            chatInput.value = '';

            // 显示输入中
            showTyping(true);
            sendBtn.textContent = ocI18n.t('chat_send');
            isGenerating = true;

            try {
                const apiUrl = `${API_BASE}/api/chat/stream`;
                console.log('[Chat] 发送请求到:', apiUrl);
                console.log('[Chat] 请求内容:', { message, session_id: getSessionId(), user_name: currentUserName });

                // 带超时的 fetch（120秒）
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 120000);

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    cache: 'no-store',
                    body: JSON.stringify({
                        message: message,
                        session_id: getSessionId(),
                        user_name: currentUserName,
                        direct_mode: directMode,
                        agent_mode: false
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                console.log('[Chat] 收到响应:', response.status, response.statusText);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('[Chat] HTTP错误:', response.status, errorText);
                    throw new Error(`API请求失败 (${response.status})`);
                }

                // 创建流式消息气泡
                showTyping(false);
                const msgDiv = addMessage('', 'assistant');
                const contentDiv = msgDiv.querySelector('.message-content');
                let fullText = '';
                // 渲染富文本（支持截图图片）
                function renderRichText(text) {
                    const imageRegex = /\[IMAGE:base64,([A-Za-z0-9+/=]+)\]/g;
                    let html = escapeHtml(text);
                    html = html.replace(/\[IMAGE:base64,([A-Za-z0-9+/=]+)\]/g, function(_, b64) {
                        return `<div class="message-image" onclick="showImageModal(this.src)"><img src="data:image/png;base64,${b64}" alt="桌面截图"></div>`;
                    });
                    return html;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.image) {
                                    // 截图图片数据，先渲染到聊天窗口
                                    const imgHtml = `<div class="message-image" onclick="showImageModal(this.src)"><img src="data:image/png;base64,${data.image}" alt="桌面截图"></div>`;
                                    if (!contentDiv.innerHTML.includes('message-image')) {
                                        contentDiv.innerHTML = imgHtml;
                                    } else {
                                        contentDiv.innerHTML += imgHtml;
                                    }
                                    fullText += `[IMAGE:base64,${data.image.substring(0, 20)}]`;
                                } else if (data.delta) {
                                    fullText += data.delta;
                                    // 如果还没有图片，用 textContent（流式更新更快）
                                    if (!contentDiv.querySelector('.message-image')) {
                                        contentDiv.textContent = fullText;
                                    }
                                } else if (data.tool_calls) {
                                    // Agent 模式：显示工具调用状态
                                    const tcText = data.tool_calls.map(tc => `[${tc.tool}]`).join(' ');
                                    fullText += `\n\n🔧 ${tcText}\n`;
                                    contentDiv.textContent = fullText;
                                } else if (data.done) {
                                    console.log('[Chat] 完成:', data);
                                    // 处理模式切换
                                    if (data.mode === 'direct_activated' || data.mode === 'direct') {
                                        directMode = true;
                                        updateModeBadge(true);
                                    } else if (data.mode === 'direct_deactivated') {
                                        directMode = false;
                                        updateModeBadge(false);
                                    }
                                } else if (data.heartbeat) {
                                    // 心跳包，忽略
                                }
                            } catch (e) {
                                // 忽略 JSON 解析错误（可能是心跳空数据）
                            }
                        }
                    }
                }

                if (!fullText) {
                    contentDiv.textContent = ocI18n.t('chat_error_generic');
                } else {
                    // 流式完成后渲染富文本（截图图片等）
                    contentDiv.innerHTML = renderRichText(fullText);
                }

                // 更新消息计数
                if (!hasPaid) {
                    messageCount++;
                    localStorage.setItem('chat_msg_count', String(messageCount));
                    if (messageCount >= 3) {
                        showPaymentPrompt();
                    }
                }

            } catch (e) {
                console.error('[Chat] 完整错误:', e);
                console.error('[Chat] 错误详情:', e.message, e.stack);
                showTyping(false);

                // 区分超时和网络错误
                let errorMsg;
                if (e.name === 'AbortError' || e.message.includes('signal is aborted')) {
                    errorMsg = ocI18n.t('chat_error_timeout');
                } else if (e.message.includes('Load failed') || e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
                    errorMsg = ocI18n.t('chat_error_network');
                } else {
                    errorMsg = `${ocI18n.t('chat_error_other')}: ${e.message}`;
                }

                setTimeout(() => {
                    addMessage(errorMsg, 'assistant');
                }, 1000);
            }

            // 生成完成，检查队列
            isGenerating = false;
            sendBtn.textContent = ocI18n.t('chat_send');
            processMessageQueue();
        }

        // 处理消息队列
        function processMessageQueue() {
            if (messageQueue.length > 0) {
                const nextMsg = messageQueue.shift();
                updateQueueMessage();
                console.log('[Chat] 出队发送:', nextMsg);
                chatInput.value = nextMsg;
                // 延迟一下确保 UI 已就绪
                setTimeout(() => sendMessage(), 100);
            } else {
                removeQueueMessage();
            }
        }

        // 更新/移除队列消息显示
        function updateQueueMessage() {
            let qMsg = document.getElementById('queueBubble');
            if (!qMsg) {
                qMsg = document.createElement('div');
                qMsg.id = 'queueBubble';
                qMsg.className = 'message assistant';
                qMsg.style.opacity = '0.6';
                qMsg.innerHTML = '<div>' + ocI18n.t('chat_queue_text') + '</div>';
                chatMessages.prepend(qMsg);
            }
            qMsg.querySelector('div').textContent = `排队中(${messageQueue.length}条等待)`;
        }

        function removeQueueMessage() {
            const qMsg = document.getElementById('queueBubble');
            if (qMsg) qMsg.remove();
        }

        // 付费提示弹窗
        function showPaymentPrompt() {
            const qrCode = document.getElementById('qrCode');
            qrCode.classList.add('visible');

            // 在聊天窗口显示提示
            const existing = document.getElementById('paymentPrompt');
            if (existing) return;

            const promptDiv = document.createElement('div');
            promptDiv.id = 'paymentPrompt';
            promptDiv.className = 'message assistant';
            promptDiv.style.borderColor = 'rgba(0, 217, 255, 0.5)';
            promptDiv.style.background = 'rgba(0, 217, 255, 0.05)';
            promptDiv.innerHTML = `
                <div class="message-content">
                    <p>` + ocI18n.t('chat_payment_prompt') + `</p>
                    <button onclick="confirmPayment()" style="margin-top: 0.8rem; padding: 0.5rem 1.5rem; background: rgba(0,217,255,0.2); border: 1px solid #00d9ff; border-radius: 20px; color: #00d9ff; cursor: pointer; font-size: 0.9rem;">` + ocI18n.t('chat_payment_btn') + `</button>
                </div>
            `;
            chatMessages.appendChild(promptDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 确认支付
        function confirmPayment() {
            hasPaid = true;
            localStorage.setItem('chat_has_paid', 'true');
            const prompt = document.getElementById('paymentPrompt');
            if (prompt) prompt.remove();
            addMessage(ocI18n.t('chat_payment_confirmed'), 'assistant');
        }

        // 更新模式徽章
        function updateModeBadge(isDirect) {
            const badge = document.getElementById('modeBadge');
            const statusText = document.getElementById('statusText');
            if (isDirect) {
                badge.textContent = ocI18n.t('chat_status_direct');
                badge.style.display = 'inline';
                statusText.textContent = ocI18n.t('chat_status_direct');
                sendBtn.classList.add('direct-mode');
            } else {
                badge.style.display = 'none';
                statusText.textContent = ocI18n.t('chat_status_normal');
                sendBtn.classList.remove('direct-mode');
            }
        }

        // 检测用户名字
        function detectUserName(message) {
            const namePatterns = [
                /我叫(\S{1,10})/,
                /我是(\S{1,10})/,
                /名字是(\S{1,10})/,
                /称呼我(\S{1,10})/
            ];

            // 排除疑问词（如"什么名字？"、"是谁"等）
            const skipWords = ['什么', '谁', '哪个', '几', '怎么', '如何', '啥'];

            for (let pattern of namePatterns) {
                const match = message.match(pattern);
                if (match && match[1] && match[1].length < 10) {
                    const name = match[1].replace(/[,.!?。，！？]/g, '');
                    // 跳过疑问词
                    if (skipWords.some(w => name.includes(w))) continue;
                    if (name && name.length > 1 && name.length < 10) {
                        currentUserName = name;
                        localStorage.setItem('openclaw_user_name', name);
                        console.log('检测到用户名字:', name);
                        break;
                    }
                }
            }
        }

        // 添加消息到聊天窗口
        function addMessage(text, sender, timeObj = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const time = timeObj
                ? timeObj.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
                : new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            // 检测并渲染 [IMAGE:base64,...] 标记
            let contentHtml = '';
            const imageRegex = /\[IMAGE:base64,([A-Za-z0-9+/=]+)\]/g;
            let match;
            let remainingText = text;

            while ((match = imageRegex.exec(text)) !== null) {
                const b64 = match[1];
                const imgHtml = `<div class="message-image" onclick="showImageModal('${b64.substring(0, 50)}...')"><img src="data:image/png;base64,${b64}" alt="桌面截图" onclick="showImageModal(this.src)"></div>`;
                contentHtml += imgHtml;
                remainingText = remainingText.replace(match[0], '');
            }

            // 清理掉所有 IMAGE 标记后的纯文本
            const cleanText = text.replace(/\[IMAGE:base64,[A-Za-z0-9+/=]+\]/g, '').trim();

            messageDiv.innerHTML = `
                <div class="message-content">${contentHtml}${cleanText ? escapeHtml(cleanText) : ''}</div>
                <div class="message-time">${time}</div>
            `;

            chatMessages.prepend(messageDiv);
            return messageDiv;
        }

        // 图片放大模态框
        function showImageModal(src) {
            event.stopPropagation();
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            img.src = src.startsWith('data:') ? src : `data:image/png;base64,${src}`;
            modal.classList.add('active');
        }
        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        // VNC 预览切换
        let vncLoaded = false;
        function toggleVNC() {
            const preview = document.getElementById('vncPreview');
            if (!preview.classList.contains('active')) {
                preview.classList.add('active');
                if (!vncLoaded) {
                    document.getElementById('vncFrame').src = '/vnc/vnc.html?password=openclaw&autoconnect=true&resize=remote';
                    vncLoaded = true;
                }
            } else {
                preview.classList.remove('active');
            }
        }
        function showVNCPreview(show) {
            const preview = document.getElementById('vncPreview');
            if (show) {
                preview.classList.add('active');
                if (!vncLoaded) {
                    document.getElementById('vncFrame').src = '/vnc/vnc.html?password=openclaw&autoconnect=true&resize=remote';
                    vncLoaded = true;
                }
            } else {
                preview.classList.remove('active');
            }
        }

        // 显示/隐藏输入中指示器
        function showTyping(show) {
            typingIndicator.classList.toggle('active', show);
            if (show) {
                chatMessages.prepend(typingIndicator);
            }
        }

        // 获取本地回复（fallback）- 仅在 API 不可用时使用
        function getLocalResponse(message) {
            return '抱歉，服务器暂时无法连接，请稍后再试 🙏';
        }

        // 获取临时会话 ID（不保存到本地存储）
        function getSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 欢迎消息
        console.log('%c💬 欢迎来到心灵交互', 'font-size: 18px; color: #00d9ff;');
        console.log('%c与 OpenClaw 对话，进入她的思想世界', 'font-size: 12px; color: #8892b0;');
    </script>
