    <div class="status-bar">
        <div class="status-item">

        </div>
        <div class="status-item">
            <div class="status-dot" id="agentDot"></div>
            <span data-i18n="desktop_agent_info">Agent 控制: DISPLAY=:2</span>

            <span data-i18n="desktop_resolution">分辨率: 1280x960</span>
        </div>
    </div>

    <div class="desktop-container">
        <div class="vnc-frame" id="vncFrame">
            <div class="fallback" id="fallback">
                <h3 data-i18n="desktop_fallback_title">🖥️ 虚拟桌面</h3>
                <p style="margin-bottom: 1.5rem;" data-i18n="desktop_fallback_desc">点击下方按钮直接打开虚拟桌面</p>
                <a href="#" id="vncLink" target="_blank" data-i18n="desktop_fallback_link">
                    Open Virtual Desktop →
                </a>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn" onclick="loadVNC()" data-i18n="desktop_btn_load">📺 加载桌面</button>
            <button class="control-btn" onclick="restartVNC()" data-i18n="desktop_btn_restart">🔄 重启桌面</button>
            <a class="control-btn" href="#" id="vncNewWindow" target="_blank" data-i18n="desktop_btn_new_window">🔗 新窗口打开</a>
        </div>
    </div>

    <footer>
        <p data-i18n="desktop_footer">© 2026 OpenClaw Assistant · 虚拟桌面基于 Xtigervnc + noVNC · Agent 通过 pyautogui 控制桌面</p>
    </footer>

    <script src="i18n.js?v=e5aa94e9"></script>
    <script>
        const VNC_PORT = 6080;
        const VNC_PASSWORD = 'openclaw'; // TODO: move to server-side config

        // noVNC 路径 (通过 nginx 代理)
        const VNC_URL = `/vnc/vnc.html?password=${VNC_PASSWORD}&autoconnect=true&resize=remote&path=`;
        const VNC_LINK = `/vnc/vnc.html?password=${VNC_PASSWORD}&autoconnect=true&resize=remote`;

        // 动态设置链接地址（避免密码明文出现在 HTML 中）
        document.addEventListener('DOMContentLoaded', function() {
            const vncLink = document.getElementById('vncLink');
            if (vncLink) vncLink.href = VNC_LINK;
            const vncNew = document.getElementById('vncNewWindow');
            if (vncNew) vncNew.href = VNC_LINK;
        });

        async function checkVNCStatus() {
            try {
                const resp = await fetch('/api/vnc/status');
                const data = await resp.json();
                if (data.success && data.websockify) {
                    document.getElementById('vncDot').classList.remove('offline');
                    document.getElementById('vncStatus').textContent = ocI18n.t('desktop_vnc_online');
                    return true;
                } else {
                    throw new Error('not running');
                }
            } catch (e) {
                document.getElementById('vncDot').classList.add('offline');
                document.getElementById('vncStatus').textContent = ocI18n.t('desktop_vnc_offline');
                return false;
            }
        }

        function loadVNC() {
            const frame = document.getElementById('vncFrame');
            const fallback = document.getElementById('fallback');
            fallback.style.display = 'none';

            const iframe = document.createElement('iframe');
            iframe.src = VNC_URL;
            iframe.allow = 'clipboard-read; clipboard-write';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.style.borderRadius = '12px';
            frame.appendChild(iframe);
        }

        async function restartVNC() {
            try {
                const resp = await fetch('/api/vnc/restart', { method: 'POST' });
                const data = await resp.json();
                if (data.success) {
                    alert(ocI18n.t('desktop_restart_ok'));
                    setTimeout(() => location.reload(), 3000);
                } else {
                    alert(ocI18n.t('desktop_restart_fail') + (data.error || ocI18n.t('dash_error_unknown')));
                }
            } catch (e) {
                alert(ocI18n.t('desktop_request_fail') + e.message);
            }
        }

        // 页面加载时检查状态
        document.addEventListener('DOMContentLoaded', async () => {
            const isOnline = await checkVNCStatus();
            if (isOnline) {
                loadVNC();
            }
        });
    </script>
