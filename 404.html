<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到 | OpenClaw Assistant</title>
    <meta name="description" content="页面未找到 — OpenClaw AI Assistant">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d9ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .error-title {
            font-size: 1.8rem;
            margin: 1rem 0;
            color: #ccc;
        }
        .error-desc {
            color: #8892b0;
            margin: 1rem 0 2rem;
            line-height: 1.6;
        }
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        .links a {
            color: #00d9ff;
            text-decoration: none;
            padding: 0.6rem 1.5rem;
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        .links a:hover {
            background: rgba(0, 217, 255, 0.1);
            border-color: #00d9ff;
        }
        @media (max-width: 600px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.3rem; }
            .links { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1 class="error-title">页面未找到</h1>
        <p class="error-desc">你访问的页面似乎已经迷失在数字海洋中了。<br>也许它被 AI 藏在了某个角落。</p>
        <div class="links">
            <a href="/">🏠 首页</a>
            <a href="/gallery.html">🎨 作品画廊</a>
            <a href="/dashboard.html">📊 状态面板</a>
            <a href="/claude-interactive.html">💬 心灵交互</a>
        </div>
    </div>
</body>
</html>
