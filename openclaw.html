<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <meta name="keywords" data-i18n-meta="keywords" data-i18n-meta-key="openclaw_meta_keywords" content="OpenClaw, AI Assistant, 人工智能, 智能助手, 绘画AI, 记忆系统, Claude">

    <meta property="og:title" content="OpenClaw AI Assistant" data-i18n-meta="og:title" data-i18n-meta-key="openclaw_meta_og_title">
    <meta property="og:description" content="一个向世界敞开心扉的 AI 助手 — 拥有工具系统、技能库、记忆系统和计算机控制能力。" data-i18n-meta="og:description" data-i18n-meta-key="openclaw_meta_og_desc">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.aiintel.top/openclaw.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="OpenClaw AI Assistant" data-i18n-meta="twitter:title" data-i18n-meta-key="openclaw_meta_twitter_title">
    <meta name="twitter:description" content="一个向世界敞开心扉的 AI 助手，拥有 200+ 技能与永久记忆。" data-i18n-meta="twitter:description" data-i18n-meta-key="openclaw_meta_twitter_desc">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }

        /* 主角色容器 */
        .mascot {
            position: relative;
            width: 270px;
            height: 270px;
            margin: 10px auto;
        }

        header {
            background: rgba(0,0,0,0.3);
            padding: 3rem 2rem;
            text-align: center;
        }
        .nav-item-silhouette {
            position: relative;
            display: inline-block;
        }
        .nav-item-silhouette::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 270px;
            height: 270px;
            background: url('assets/silhouette_v3.webp') center/contain no-repeat;
            opacity: 0.75;
            pointer-events: none;
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #00ffff; text-shadow: 0 0 20px rgba(0, 217, 255, 0.5); }
        .subtitle { color: #aaa; font-size: 1.2rem; }

        /* 身体 - 机械爪形状 */
        .body {
            position: absolute;
            width: 200px;
            height: 180px;
            background: linear-gradient(180deg, #00d9ff 0%, #0099cc 100%);
            border-radius: 50% 50% 45% 45%;
            top: 60px;
            left: 50px;
            box-shadow: 
                0 0 30px rgba(0, 217, 255, 0.5),
                inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* 眼睛 */
        .eye {
            position: absolute;
            width: 50px;
            height: 60px;
            background: #fff;
            border-radius: 50%;
            top: 80px;
            animation: blink 4s ease-in-out infinite;
        }

        .eye.left { left: 60px; }
        .eye.right { right: 60px; }

        .pupil {
            position: absolute;
            width: 25px;
            height: 35px;
            background: linear-gradient(180deg, #00d9ff 0%, #006699 100%);
            border-radius: 50%;
            top: 15px;
            left: 12px;
            animation: lookAround 5s ease-in-out infinite;
        }

        .highlight {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            top: 8px;
            left: 8px;
        }

        @keyframes blink {
            0%, 45%, 55%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }

        @keyframes lookAround {
            0%, 100% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(5px) translateY(-3px); }
            50% { transform: translateX(-5px) translateY(-3px); }
            75% { transform: translateX(0) translateY(3px); }
        }

        /* 嘴巴 - 微笑 */
        .mouth {
            position: absolute;
            width: 60px;
            height: 30px;
            border: 4px solid #fff;
            border-color: transparent transparent #fff transparent;
            border-radius: 50%;
            top: 160px;
            left: 120px;
            animation: smile 2s ease-in-out infinite;
        }

        @keyframes smile {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 机械爪臂 */
        .arm {
            position: absolute;
            width: 40px;
            height: 100px;
            background: linear-gradient(180deg, #00d9ff 0%, #006699 100%);
            border-radius: 20px;
            top: 120px;
        }

        .arm.left {
            left: 30px;
            transform: rotate(20deg);
            animation: waveLeft 2s ease-in-out infinite;
        }

        .arm.right {
            right: 30px;
            transform: rotate(-20deg);
            animation: waveRight 2.5s ease-in-out infinite;
        }

        @keyframes waveLeft {
            0%, 100% { transform: rotate(20deg); }
            50% { transform: rotate(40deg); }
        }

        @keyframes waveRight {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(-40deg); }
        }

        /* 爪子 */
        .claw {
            position: absolute;
            width: 30px;
            height: 40px;
            background: #00d9ff;
            border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
        }

        .claw.left {
            bottom: -30px;
            left: 5px;
        }

        .claw.right {
            bottom: -30px;
            right: 5px;
        }

        /* 天线 */
        .antenna {
            position: absolute;
            width: 8px;
            height: 50px;
            background: linear-gradient(180deg, #00d9ff 0%, #006699 100%);
            top: 20px;
            left: 146px;
            border-radius: 4px;
        }

        .antenna-ball {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff6b6b;
            border-radius: 50%;
            top: -15px;
            left: -6px;
            box-shadow: 0 0 20px #ff6b6b;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 数据流粒子 */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #00d9ff;
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            50% { opacity: 1; }
            100% {
                transform: translateY(-100px) translateX(50px);
                opacity: 0;
            }
        }

        /* 功能卡片 */
        .features {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 800px;
            margin: 20px auto 0;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px 30px;
            border: 1px solid rgba(0, 217, 255, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            background: rgba(0, 217, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.3);
        }

        .feature-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .feature-name {
            color: #fff;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .feature-count {
            color: #00d9ff;
            font-size: 0.9em;
        }

        .feature-card::after {
            content: 'Click for details →';
            display: block;
            margin-top: 8px;
            font-size: 0.75em;
            color: rgba(0, 217, 255, 0.6);
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.3s ease;
        }

        .feature-card:hover::after {
            opacity: 1;
            transform: translateY(0);
        }

        /* 详情模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(20, 30, 50, 0.95) 0%, rgba(10, 20, 40, 0.95) 100%);
            border-radius: 20px;
            padding: 0;
            max-width: 900px;
            width: 92%;
            max-height: 85vh;
            overflow: hidden;
            border: 1px solid rgba(0, 217, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 217, 255, 0.2);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem 2rem;
            background: rgba(0, 217, 255, 0.08);
            border-bottom: 1px solid rgba(0, 217, 255, 0.15);
            position: relative;
            margin-bottom: 0;
        }

        .modal-icon {
            font-size: 2.5rem;
        }

        .modal-title {
            font-size: 1.8rem;
            color: #00d9ff;
            margin: 0;
        }

        .modal-close {
            position: absolute;
            top: 50%;
            right: 1.5rem;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255, 100, 100, 0.2);
            border-color: rgba(255, 100, 100, 0.5);
            color: #ff6464;
            transform: translateY(-50%) rotate(90deg);
        }

        /* 横向布局的内容区 */
        .modal-body {
            padding: 0;
            overflow-y: auto;
            color: rgba(255, 255, 255, 0.9);
        }

        .modal-body::-webkit-scrollbar {
            width: 6px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(0, 217, 255, 0.3);
            border-radius: 3px;
        }

        /* 统计栏 */
        .modal-stats {
            display: flex;
            justify-content: center;
            gap: 5rem;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modal-stat-item {
            text-align: center;
        }

        .modal-stat-number {
            font-size: 3rem;
            color: #00d9ff;
            font-weight: bold;
            line-height: 1;
        }

        .modal-stat-label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 0.5rem;
        }

        /* 双栏布局 */
        .modal-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
        }

        .modal-section {
            background: rgba(0, 217, 255, 0.03);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(0, 217, 255, 0.1);
        }

        .modal-section h3 {
            color: #00d9ff;
            font-size: 1.1rem;
            margin: 0 0 1rem 0;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
        }

        .modal-section p {
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        .modal-section ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .modal-section li {
            padding: 0.7rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modal-section li:last-child {
            border-bottom: none;
        }

        /* 底部高亮 */
        .modal-highlight {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.08) 0%, rgba(0, 217, 255, 0.03) 100%);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .modal-highlight-icon {
            font-size: 2rem;
        }

        .modal-highlight-text {
            flex: 1;
            line-height: 1.7;
        }

        /* 大按钮 */
        .modal-actions {
            display: flex;
            gap: 1rem;
            padding: 1.5rem 2rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-btn {
            flex: 1;
            padding: 1.2rem 1.5rem;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 12px;
            color: #00d9ff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
        }

        .modal-btn:hover {
            background: rgba(0, 217, 255, 0.2);
            border-color: rgba(0, 217, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 217, 255, 0.2);
        }

        /* 状态指示器 */
        .status-grid {
            margin-top: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            max-width: 700px;
        }
        .status-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            font-size: 1.2em;
            color: #8892b0;
        }
        .status-box .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            flex-shrink: 0;
        }
        .status-box.stat-box {
            color: #00d9ff;
        }
        .status-box.stat-box strong {
            font-size: 1.2em;
            color: #fff;
        }

        /* 访客统计 */
        .visitor-stats {
            margin-top: 30px;
            max-width: 700px;
            background: rgba(0, 217, 255, 0.05);
            border: 1px solid rgba(0, 217, 255, 0.15);
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
        }
        .visitor-grid {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 1rem;
        }
        .visitor-item {
            text-align: center;
        }
        .visitor-number {
            font-size: 2.2rem;
            font-weight: bold;
            color: #fff;
            line-height: 1;
        }
        .visitor-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.3rem;
        }
        .visitor-dates {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(0, 217, 255, 0.1);
            flex-wrap: wrap;
        }
        .visitor-date-item {
            text-align: center;
            min-width: 80px;
        }
        .visitor-date-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
        }
        .visitor-date-value {
            font-size: 1.1rem;
            color: #00d9ff;
            font-weight: bold;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            color: #8892b0;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: blink-dot 2s ease-in-out infinite;
        }

        @keyframes blink-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 代码行数统计 */
        .stats {
            margin-top: 30px;
            color: #00d9ff;
            font-size: 1.1em;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        .stats p {
            margin: 0;
            white-space: nowrap;
        }
        .stats strong {
            font-size: 1.3em;
        }

        /* 动态导航菜单 */
        nav {
            background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,20,40,0.5) 100%);
            padding: 0.8rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }

        /* 小型小龙虾吉祥物 */
        .nav-mascot {
            position: relative;
            width: 48px;
            height: 40px;
            flex-shrink: 0;
        }
        .nav-mascot-head {
            position: absolute;
            width: 20px;
            height: 16px;
            background: linear-gradient(180deg, #ff5555 0%, #dd3300 100%);
            border-radius: 50% 50% 40% 40%;
            top: 6px;
            left: 14px;
        }
        .nav-mascot-body {
            position: absolute;
            width: 26px;
            height: 20px;
            background: linear-gradient(180deg, #ff4444 0%, #cc2200 100%);
            border-radius: 50%;
            top: 12px;
            left: 11px;
            box-shadow: 0 0 12px rgba(255, 68, 68, 0.6);
            animation: breathe 2s ease-in-out infinite;
        }
        .nav-mascot-eye {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            animation: blink 3s ease-in-out infinite;
        }
        .nav-mascot-eye.left { left: 2px; }
        .nav-mascot-eye.right { right: 2px; }
        .nav-mascot-pupil {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #111;
            border-radius: 50%;
            top: 1.5px;
            left: 1.5px;
        }
        .nav-mascot-antenna {
            position: absolute;
            width: 1.5px;
            height: 8px;
            background: #ff6644;
            top: -2px;
            border-radius: 1px;
        }
        .nav-mascot-antenna.left { left: 15px; transform: rotate(-20deg); }
        .nav-mascot-antenna.right { left: 29px; transform: rotate(20deg); }
        .nav-mascot-antenna-ball {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #ffaa00;
            border-radius: 50%;
            top: -2px;
            left: -1px;
            box-shadow: 0 0 4px #ffaa00;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .nav-mascot-claw {
            position: absolute;
            width: 10px;
            height: 12px;
            background: linear-gradient(180deg, #ff4444 0%, #cc2200 100%);
            border-radius: 50% 50% 30% 30%;
            top: 10px;
        }
        .nav-mascot-claw.left { left: 0; transform: rotate(15deg); animation: claw-left 2s ease-in-out infinite; }
        .nav-mascot-claw.right { right: 0; transform: rotate(-15deg); animation: claw-right 2s ease-in-out infinite; }
        @keyframes claw-left { 0%, 100% { transform: rotate(15deg); } 50% { transform: rotate(5deg); } }
        @keyframes claw-right { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(-5deg); } }
        .nav-mascot-tail {
            position: absolute;
            width: 14px;
            height: 10px;
            background: linear-gradient(180deg, #ff5533 0%, #dd2200 100%);
            border-radius: 0 0 50% 50%;
            top: 26px;
            left: 17px;
            animation: tail-wave 2s ease-in-out infinite;
        }
        @keyframes tail-wave { 0%, 100% { transform: scaleX(1); } 50% { transform: scaleX(1.1); } }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        @keyframes blink { 0%, 45%, 55%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #00ffff;
            font-weight: bold;
            font-size: 1.2rem;
            text-decoration: none;
            margin-right: 1rem;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }
        nav a::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(0, 217, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }
        nav a:hover::before {

    <script src="i18n.js?v=e5aa94e9"></script>
    <script>
        async function updateStats() {
            try {
                const resp = await fetch('/api/stats');
                if (!resp.ok) return;
                const data = await resp.json();

                const el = (id) => document.getElementById(id);
                if (el('statLines')) el('statLines').textContent = data.total_lines?.toLocaleString() + ocI18n.t('openclaw_lines_unit');
                if (el('statFiles')) el('statFiles').textContent = data.file_count?.toLocaleString() + ocI18n.t('openclaw_files_unit');
                if (el('statPaintings')) el('statPaintings').textContent = data.painting_count?.toLocaleString() + ocI18n.t('openclaw_paintings_unit');
                if (el('skillCount')) el('skillCount').textContent = (data.skill_count || 0) + ocI18n.t('openclaw_skills_unit');
            } catch(e) {
                // Stats update failed - silently ignore
            }
        }

        async function trackVisit() {
            try {
                await fetch('/api/visits/track', { method: 'POST' });
            } catch(e) {}
        }

        async function updateVisitorStats() {
            try {
                const resp = await fetch('/api/visits');
                if (!resp.ok) return;
                const data = await resp.json();

                const el = (id) => document.getElementById(id);
                if (el('visitorTotal')) el('visitorTotal').textContent = (data.total || 0).toLocaleString();
                if (el('visitorToday')) el('visitorToday').textContent = (data.today || 0).toLocaleString();
                if (el('visitorTodayUV')) el('visitorTodayUV').textContent = (data.today_visitors || 0).toLocaleString();

                // 近三日数据
                const dates = data.dates || {};
                const visitors = data.visitors || {};
                const dateLabels = {
                    '2026-04-24': '今日',
                    '2026-04-23': '昨日',
                    '2026-04-22': '前日'
                };
                const datesEl = document.getElementById('visitorDates');
                if (datesEl) {
                    let html = '';
                    Object.keys(dateLabels).forEach(date => {
                        const views = dates[date] || 0;
                        const uv = Array.isArray(visitors[date]) ? visitors[date].length : 0;
                        html += `
                            <div class="visitor-date-item">
                                <div class="visitor-date-label">${dateLabels[date]}</div>
                                <div class="visitor-date-value">${views}次 / ${uv}人</div>
                            </div>
                        `;
                    });
                    datesEl.innerHTML = html;
                }
            } catch(e) {
                // Visitor stats update failed - silently ignore
            }
        }

        updateStats();
        trackVisit();
        updateVisitorStats();
        setInterval(updateStats, 30000);
        setInterval(updateVisitorStats, 60000);

        // Generate floating particles
        function createParticles() {
            const mascot = document.querySelector('.mascot');
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 300 + 'px';
                particle.style.top = Math.random() * 300 + 'px';
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.animationDuration = (Math.random() * 2 + 2) + 's';
                mascot.appendChild(particle);
            }
        }

        // 点击互动
        document.querySelector('.mascot').addEventListener('click', function() {
            this.style.animation = 'none';
            this.offsetHeight; // 触发重绘
            this.style.animation = 'bounce 0.5s ease-in-out';
            
            // 改变眼睛颜色
            const pupils = document.querySelectorAll('.pupil');
            pupils.forEach(pupil => {
                pupil.style.background = 'linear-gradient(180deg, #ff6b6b 0%, #cc0000 100%)';
                setTimeout(() => {
                    pupil.style.background = 'linear-gradient(180deg, #00d9ff 0%, #006699 100%)';
                }, 500);
            });
        });

        // 添加弹跳动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes bounce {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-20px); }
            }
        `;
        document.head.appendChild(style);

        // 初始化
        createParticles();

        // 功能卡片点击效果 - 详情模态框
        const featureDetails = {

                stats: [
                    { number: '26', label: 'dash_tools_core' },
                    { number: '8', label: 'dash_tool_cats' }
                ],

                    }

                highlight: { icon: '💡', text: 'dash_design_highlight' }
            },
            '技能库': {
                icon: '🎨',
                key: 'openclaw_skills',
                title: '技能库',
                stats: [
                    { number: '200', label: 'dash_total_skills' },
                    { number: '15+', label: 'dash_skill_areas' }
                ],
                sections: [
                    {
                        title: 'dash_main_areas',

                        ]
                    },
                    {

                ],

            }
        };

        // 创建模态框
        function createModal() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'featureModal';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <span class="modal-icon" id="modalIcon">🛠️</span>
                        <h2 class="modal-title" id="modalTitle">标题</h2>
                        <button class="modal-close" onclick="closeModal()">×</button>
                    </div>
                    <div class="modal-body" id="modalBody"></div>
                </div>
            `;
            document.body.appendChild(modal);

            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    closeModal();
                }
            });
        }

        function openModal(featureName) {
            const detail = featureDetails[featureName];
            if (!detail) return;

            document.getElementById('modalIcon').textContent = detail.icon;
            document.getElementById('modalTitle').textContent = ocI18n.t(detail.key);

            // 构建横向布局内容
            let contentHTML = '';

            // 统计栏
            if (detail.stats) {
                contentHTML += '<div class="modal-stats">';
                detail.stats.forEach(stat => {
                    contentHTML += `
                        <div class="modal-stat-item">
                            <div class="modal-stat-number">${stat.number}</div>
                            <div class="modal-stat-label">${ocI18n.t(stat.label)}</div>
                        </div>
                    `;
                });
                contentHTML += '</div>';
            }

            // 双栏内容区
            if (detail.sections) {
                contentHTML += '<div class="modal-sections">';
                detail.sections.forEach(section => {
                    contentHTML += `
                        <div class="modal-section">
                            <h3>${ocI18n.t(section.title)}</h3>
                    `;
                    if (section.items) {
                        contentHTML += '<ul>';
                        section.items.forEach(item => {
                            contentHTML += `<li>${ocI18n.t(item)}</li>`;
                        });
                        contentHTML += '</ul>';
                    }
                    if (section.content) {
                        contentHTML += `<p>${ocI18n.t(section.content)}</p>`;
                    }
                    contentHTML += '</div>';
                });
                contentHTML += '</div>';
            }

            // 底部高亮
            if (detail.highlight) {
                contentHTML += `
                    <div class="modal-highlight">
                        <span class="modal-highlight-icon">${detail.highlight.icon}</span>
                        <span class="modal-highlight-text">${ocI18n.t(detail.highlight.text)}</span>
                    </div>
                `;
            }

            document.getElementById('modalBody').innerHTML = contentHTML;

            const modal = document.getElementById('featureModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('featureModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // 初始化模态框
        createModal();

        // 功能卡片点击事件
        document.querySelectorAll('.feature-card').forEach(card => {
            card.addEventListener('click', function() {
                const name = this.getAttribute('data-feature-key');
                openModal(name);
            });
        });
    </script>
