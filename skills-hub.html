    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --card-hover: #1a2a4a;
            --text: #eee;
            --text-dim: #aaa;
            --primary: #00ffff;
            --primary-dim: rgba(0, 217, 255, 0.15);
            --accent: #ff6b6b;
            --accent2: #4CAF50;
            --accent3: #FF9800;
            --accent4: #2196F3;
            --accent5: #9C27B0;
            --border: rgba(0, 217, 255, 0.2);
            --radius: 12px;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        nav {
            background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,20,40,0.5) 100%);
            padding: 0.8rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }
        .nav-mascot { position: relative; width: 48px; height: 40px; flex-shrink: 0; }
        .nav-mascot-head { position: absolute; width: 20px; height: 16px; background: linear-gradient(180deg, #ff5555 0%, #dd3300 100%); border-radius: 50% 50% 40% 40%; top: 6px; left: 14px; }
        .nav-mascot-body { position: absolute; width: 26px; height: 20px; background: linear-gradient(180deg, #ff4444 0%, #cc2200 100%); border-radius: 50%; top: 12px; left: 11px; box-shadow: 0 0 12px rgba(255, 68, 68, 0.6); animation: breathe 2s ease-in-out infinite; }
        .nav-mascot-eye { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; top: 2px; animation: blink 3s ease-in-out infinite; }
        .nav-mascot-eye.left { left: 2px; }
        .nav-mascot-eye.right { right: 2px; }
        .nav-mascot-pupil { position: absolute; width: 3px; height: 3px; background: #111; border-radius: 50%; top: 1.5px; left: 1.5px; }
        .nav-mascot-antenna { position: absolute; width: 1.5px; height: 8px; background: #ff6644; top: -2px; border-radius: 1px; }
        .nav-mascot-antenna.left { left: 15px; transform: rotate(-20deg); }
        .nav-mascot-antenna.right { left: 29px; transform: rotate(20deg); }
        .nav-mascot-antenna-ball { position: absolute; width: 3px; height: 3px; background: #ffaa00; border-radius: 50%; top: -2px; left: -1px; box-shadow: 0 0 4px #ffaa00; animation: pulse 1.5s ease-in-out infinite; }
        .nav-mascot-claw { position: absolute; width: 10px; height: 12px; background: linear-gradient(180deg, #ff4444 0%, #cc2200 100%); border-radius: 50% 50% 30% 30%; top: 10px; }
        .nav-mascot-claw.left { left: 0; transform: rotate(15deg); animation: claw-left 2s ease-in-out infinite; }
        .nav-mascot-claw.right { right: 0; transform: rotate(-15deg); animation: claw-right 2s ease-in-out infinite; }
        @keyframes claw-left { 0%, 100% { transform: rotate(15deg); } 50% { transform: rotate(5deg); } }
        @keyframes claw-right { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(-5deg); } }
        .nav-mascot-tail { position: absolute; width: 14px; height: 10px; background: linear-gradient(180deg, #ff5533 0%, #dd2200 100%); border-radius: 0 0 50% 50%; top: 26px; left: 17px; animation: tail-wave 2s ease-in-out infinite; }
        @keyframes tail-wave { 0%, 100% { transform: scaleX(1); } 50% { transform: scaleX(1.1); } }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        @keyframes blink { 0%, 45%, 55%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        .nav-brand { display: flex; align-items: center; gap: 0.8rem; color: var(--primary); font-weight: bold; font-size: 1.2rem; text-decoration: none; margin-right: 1rem; }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; }
        nav a { color: #fff; text-decoration: none; font-size: 0.95rem; transition: all 0.3s ease; padding: 0.5rem 1rem; border-radius: 20px; position: relative; overflow: hidden; }
        nav a:hover { color: var(--primary); transform: translateY(-2px); text-shadow: 0 0 10px rgba(0, 217, 255, 0.5); }
        nav a.active { color: var(--primary); background: var(--primary-dim); box-shadow: 0 0 15px rgba(0, 217, 255, 0.3); }
        header { background: rgba(0,0,0,0.3); padding: 3rem 2rem; text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); text-shadow: 0 0 20px rgba(0, 217, 255, 0.5); }
        .subtitle { color: var(--text-dim); font-size: 1.2rem; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .stat-pill {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }
        .stat-pill .num { color: var(--primary); font-weight: bold; font-size: 1.2rem; }

        /* Search and filters */
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 0.8rem 1.2rem 0.8rem 2.8rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box input:focus { border-color: var(--primary); }
        .search-box .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 1.1rem;
        }
        .filter-chips {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .chip {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        .chip:hover, .chip.active {
            background: var(--primary-dim);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* Skill grid */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .skill-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .skill-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
            border-color: var(--primary);
        }
        .skill-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px;
            height: 100%;
            border-radius: 4px 0 0 4px;
        }
        .skill-card.cat-reasoning::before { background: var(--accent); }
        .skill-card.cat-creation::before { background: var(--accent2); }
        .skill-card.cat-tool::before { background: var(--accent3); }
        .skill-card.cat-healing::before { background: var(--accent4); }
        .skill-card.cat-art::before { background: var(--accent5); }
        .skill-card.cat-system::before { background: #607D8B; }
        .skill-card.cat-memory::before { background: #795548; }
        .skill-card.cat-social::before { background: #E91E63; }
        .skill-header { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; }
        .skill-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .cat-reasoning .skill-icon { background: rgba(255, 107, 107, 0.2); }
        .cat-creation .skill-icon { background: rgba(76, 175, 80, 0.2); }
        .cat-tool .skill-icon { background: rgba(255, 152, 0, 0.2); }
        .cat-healing .skill-icon { background: rgba(33, 150, 243, 0.2); }
        .cat-art .skill-icon { background: rgba(156, 39, 176, 0.2); }
        .cat-system .skill-icon { background: rgba(96, 125, 139, 0.2); }
        .cat-memory .skill-icon { background: rgba(121, 85, 72, 0.2); }
        .cat-social .skill-icon { background: rgba(233, 30, 99, 0.2); }
        .skill-info { flex: 1; }
        .skill-name { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 0.3rem; }
        .skill-desc { font-size: 0.85rem; color: var(--text-dim); line-height: 1.4; }
        .skill-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.8rem; }
        .tag {
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.05);
            color: var(--text-dim);
        }
        .skill-meta { display: flex; gap: 1rem; margin-top: 1rem; font-size: 0.8rem; color: var(--text-dim); }
        .skill-meta span { display: flex; align-items: center; gap: 0.3rem; }
        .skill-difficulty {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        .diff-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }
        .diff-dot.filled { background: var(--primary); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }
        .modal-title { font-size: 1.5rem; color: var(--primary); margin-bottom: 0.5rem; padding-right: 2rem; }
        .modal-category {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
        .modal-body { color: var(--text-dim); line-height: 1.8; }
        .modal-body h3 { color: var(--text); margin: 1rem 0 0.5rem; font-size: 1.1rem; }
        .modal-body ul { padding-left: 1.5rem; }
        .modal-body li { margin-bottom: 0.3rem; }
        .modal-stats { display: flex; gap: 1.5rem; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .modal-stat { text-align: center; }
        .modal-stat .value { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .modal-stat .label { font-size: 0.8rem; color: var(--text-dim); }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }
        .empty-state .icon { font-size: 4rem; margin-bottom: 1rem; }
        .empty-state p { font-size: 1.1rem; }

        /* View toggle */
        .view-toggle { display: flex; gap: 0.5rem; }
        .view-btn {
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s;
        }
        .view-btn.active { background: var(--primary-dim); color: var(--primary); border-color: var(--primary); }
        .skills-list { display: none; }
        .skills-list.active { display: block; }
        .skills-grid.active { display: grid; }
        .list-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .list-item:hover { border-color: var(--primary); background: var(--card-hover); }
        .list-item .skill-icon { width: 36px; height: 36px; font-size: 1.2rem; }
        .list-item .skill-name { font-weight: 600; }

        /* Sort dropdown */
        .sort-select {
            padding: 0.5rem 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }

        footer { text-align: center; padding: 2rem; background: rgba(0,0,0,0.3); margin-top: 3rem; color: #666; }
        @media (max-width: 768px) {
            nav a { margin: 0 0.2rem; font-size: 0.85rem; padding: 0.3rem 0.6rem; }
            .skills-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>

        let skills = [...skillsDB];
        if (currentFilter !== 'all') {
            skills = skills.filter(s => s.cat === currentFilter);
        }
        if (currentSearch) {
            const q = currentSearch.toLowerCase();
            skills = skills.filter(s =>
                s.name.toLowerCase().includes(q) ||
                s.nameEn.toLowerCase().includes(q) ||
                s.desc.toLowerCase().includes(q) ||
                s.tags.some(t => t.toLowerCase().includes(q))
            );
        }
        const sortBy = document.getElementById('sortSelect').value;
        skills.sort((a, b) => {
            if (sortBy === 'name') return a.name.localeCompare(b.name, 'zh');
            if (sortBy === 'category') return a.cat.localeCompare(b.cat) || a.name.localeCompare(b.name, 'zh');
            if (sortBy === 'difficulty') return b.difficulty - a.difficulty;
            if (sortBy === 'popularity') return b.popularity - a.popularity;
            return 0;
        });
        return skills;
    }

    function renderGrid(skills) {
        const grid = document.getElementById('skillsGrid');
        grid.innerHTML = skills.map(s => `
            <div class="skill-card cat-${s.cat}" onclick="openModal('${s.id}')">
                <div class="skill-header">
                    <div class="skill-icon">${s.icon}</div>
                    <div class="skill-info">
                        <div class="skill-name">${s.name}</div>
                        <div class="skill-desc">${s.desc}</div>
                    </div>
                </div>
                <div class="skill-tags">
                    ${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
                <div class="skill-meta">
                    <span>
                        <span class="skill-difficulty">
                            ${[1,2,3,4,5].map(d => `<span class="diff-dot ${d <= s.difficulty ? 'filled' : ''}"></span>`).join('')}
                        </span>
                    </span>
                    <span>🔥 ${s.popularity}%</span>
                    <span>${categoryNames[s.cat]}</span>
                </div>
            </div>
        `).join('');
    }

    function renderList(skills) {
        const list = document.getElementById('skillsList');
        list.innerHTML = skills.map(s => `
            <div class="list-item" onclick="openModal('${s.id}')">
                <div class="skill-icon">${s.icon}</div>
                <div style="flex:1">
                    <div class="skill-name">${s.name}</div>
                    <div class="skill-desc">${s.desc}</div>
                </div>
                <div class="skill-tags">
                    ${s.tags.slice(0, 2).map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
                <span style="color:var(--text-dim);font-size:0.85rem;">${categoryNames[s.cat]}</span>
            </div>
        `).join('');
    }

    function filterSkills() {
        currentSearch = document.getElementById('searchInput').value;
        renderSkills();
    }

    function sortSkills() {
        renderSkills();
    }

    function setFilter(cat) {
        currentFilter = cat;
        document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
        renderSkills();
    }

    function setView(view) {
        currentView = view;
        document.getElementById('gridViewBtn').classList.toggle('active', view === 'grid');
        document.getElementById('listViewBtn').classList.toggle('active', view === 'list');
        document.getElementById('skillsGrid').classList.toggle('active', view === 'grid');
        document.getElementById('skillsList').classList.toggle('active', view === 'list');
    }

    function openModal(id) {
        const s = skillsDB.find(sk => sk.id === id);
        if (!s) return;
        document.getElementById('modalTitle').textContent = s.icon + ' ' + s.name;
        const catEl = document.getElementById('modalCategory');
        catEl.textContent = categoryNames[s.cat];
        catEl.style.background = categoryColors[s.cat];
        document.getElementById('modalBody').innerHTML = `
            <p>${s.desc}</p>
            <h3>概述</h3><p>${s.details.overview}</p>
            <h3>核心能力</h3>
            <ul>${s.details.capabilities.map(c => `<li>${c}</li>`).join('')}</ul>
            <h3>应用场景</h3>
            <ul>${s.details.useCases.map(u => `<li>${u}</li>`).join('')}</ul>
        `;
        document.getElementById('modalStats').innerHTML = `
            <div class="modal-stat"><div class="value">${s.difficulty}/5</div><div class="label">难度等级</div></div>
            <div class="modal-stat"><div class="value">${s.popularity}%</div><div class="label">使用率</div></div>
            <div class="modal-stat"><div class="value">${s.tags.length}</div><div class="label">标签数</div></div>
        `;
        document.getElementById('modalOverlay').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal(e) {
        if (e && e.target !== e.currentTarget) return;
        document.getElementById('modalOverlay').classList.remove('active');
        document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    init();
    </script>
</body>
</html>
